name: 🔄 Auto Update Resource Catalog

on:
  schedule:
    # 每周一 UTC 0点 (北京时间早上8点) 运行
    - cron: '0 0 * * 1'
  # 允许手动触发
  workflow_dispatch:
    inputs:
      force_update:
        description: '强制更新所有数据（忽略缓存）'
        required: false
        default: 'false'

jobs:
  update-resources:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允许写入仓库内容

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 🔍 Run update script
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "🚀 Starting TechStack Radar update..."
        python update_resources.py
        echo "✅ Update script completed!"

    - name: 📊 Check for changes
      id: git-check
      run: |
        git status
        if git diff --quiet; then
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "📭 No changes detected"
        else
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "📬 Changes detected!"
        fi

    - name: 💾 Commit and push changes
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

        # 添加所有变更文件
        git add README.md

        # 生成提交信息
        commit_date=$(date '+%Y-%m-%d')
        git commit -m "🔄 Auto-update resource catalog - $commit_date" \
                   -m "Automated update of stars and last updated times." \
                   -m "Triggered by GitHub Actions workflow."

        # 推送到仓库
        git push
        echo "📤 Changes pushed successfully!"

    - name: 📝 No changes notification
      if: steps.git-check.outputs.changes == 'false'
      run: |
        echo "📭 No changes to commit. Everything is up to date!"

    - name: ✅ Workflow completed
      run: |
        echo "🎉 TechStack Radar auto-update workflow completed successfully!"
        echo "📅 Next scheduled run: Every Monday at 00:00 UTC"
